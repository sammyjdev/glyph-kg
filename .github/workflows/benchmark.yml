# GLYPH benchmark workflow (Phase 3, Tier 2 — on demand, not every push).
#
# Triggered manually from the Actions tab (workflow_dispatch).
#
# Required repository secrets:
#   NVIDIA_NIM_API_KEY — OSS judge (NVIDIA NIM, OpenAI-compatible; better free-tier limits than Groq)
#   ANTHROPIC_API_KEY  — answer generation (Claude Haiku 4.5)
#   BOOK_URL           — a URL the runner can fetch the source PDF from (not committed)
#
# The run rewrites eval/benchmark-baseline.json + METRICS.md and uploads them as
# artifacts. Review, then commit the updated baseline + table to publish the numbers.

name: Benchmark

on:
  workflow_dispatch:
    inputs:
      judge_model:
        description: OpenAI-compatible judge model
        default: meta/llama-3.3-70b-instruct

jobs:
  benchmark:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install
        run: pip install -e ".[document,retrieval,embeddings,eval]"

      - name: Fetch source book
        run: curl -fsSL "${{ secrets.BOOK_URL }}" -o book.pdf

      - name: Run benchmark
        env:
          NVIDIA_NIM_API_KEY: ${{ secrets.NVIDIA_NIM_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          python3 scripts/run_benchmark.py out/monster-manual.json book.pdf \
            --base-url https://integrate.api.nvidia.com/v1 \
            --api-key-env NVIDIA_NIM_API_KEY \
            --model "${{ inputs.judge_model }}"

      - name: Upload results
        uses: actions/upload-artifact@v4
        with:
          name: benchmark
          path: |
            METRICS.md
            eval/benchmark-baseline.json
