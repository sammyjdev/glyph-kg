name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  quality-gates:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install
        run: |
          pip install --upgrade pip setuptools
          pip install -e ".[dev,document,retrieval,code,eval]"

      - name: Security audit (pip-audit)
        run: |
          pip install pip-audit
          pip-audit

      - name: Lint (ruff)
        run: ruff check glyph tests

      - name: Security lint (ruff S, report-only)
        run: ruff check glyph tests --select S --exit-zero

      - name: Format check (ruff)
        run: ruff format --check glyph tests

      - name: Types (mypy)
        run: mypy glyph

      - name: Test + coverage gate
        run: pytest
