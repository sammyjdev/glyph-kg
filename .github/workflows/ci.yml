name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  quality-gates:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install
        run: |
          pip install --upgrade pip setuptools
          pip install -e ".[dev,document,retrieval,code,eval]"

      - name: Security audit (pip-audit)
        run: |
          pip install pip-audit
          pip-audit

      - name: Lint (ruff)
        run: ruff check glyph tests

      - name: Format check (ruff)
        run: ruff format --check glyph tests

      - name: Types (mypy)
        run: mypy glyph

      - name: Test + coverage gate
        run: pytest

  gitleaks:
    name: gitleaks
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      pull-requests: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_VERSION: "8.30.1"
          GITLEAKS_ENABLE_COMMENTS: "false"
